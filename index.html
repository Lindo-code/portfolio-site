<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title (keep it human, not corporate) -->
    <title>Lindo Matabane | Developer Portfolio</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Portfolio of Lindo - showcasing web and mobile projects built with modern technologies, performance, and clean design."
    />
    <meta name="author" content="Lindo" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Canonical -->
    <link rel="canonical" href="https://portfolio.lindocode.com/" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Optional extras (only if you actually have them) -->
    <!-- <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" /> -->
    <!-- <link rel="apple-touch-icon" href="/apple-touch-icon.png" /> -->

    <!-- Open Graph (for WhatsApp, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Lindo Matabane | Developer Portfolio" />
    <meta
      property="og:description"
      content="Explore projects, experiments, and digital products built by Lindo."
    />
    <meta property="og:url" content="https://portfolio.lindocode.com/" />
    <meta
      property="og:image"
      content="https://portfolio.lindocode.com/og-image.jpg"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lindo | Developer Portfolio" />
    <meta
      name="twitter:description"
      content="Explore projects and digital work by Lindo."
    />
    <meta
      name="twitter:image"
      content="https://portfolio.lindocode.com/og-image.jpg"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
